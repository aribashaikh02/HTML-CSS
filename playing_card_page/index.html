<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <!-- Link your external stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 1. Main container element with id playing-cards -->
    <main id="playing-cards">

        <!-- 2. Card 1: Ace of Hearts -->
        <div class="card">
            <!-- 4, 5, 6, 7. Left, Middle, and Right children divs -->
            <div class="left">A&hearts;</div>
            <div class="middle">
                <span>&hearts;</span>
            </div>
            <div class="right">A&hearts;</div>
        </div>

        <!-- 2. Card 2: King of Spades -->
        <div class="card">
            <!-- 4, 5, 6, 7. Left, Middle, and Right children divs -->
            <div class="left">K&spades;</div>
            <div class="middle">
                <span>&spades;</span>
            </div>
            <div class="right">K&spades;</div>
        </div>

        <!-- 2. Card 3: Jack of Diamonds -->
        <div class="card">
            <!-- 4, 5, 6, 7. Left, Middle, and Right children divs -->
            <div class="left">J&diams;</div>
            <div class="middle">
                <span>&diams;</span>
            </div>
            <div class="right">J&diams;</div>
        </div>

    </main>

</body>
</html>
